name: Publish to Maven Central

on:
  # Auto-trigger when upstream-sync PRs are merged
  pull_request:
    types: [closed]
    branches: [master]
  # Manual trigger with version bump type
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch   # 0.1.3 → 0.1.4
          - minor   # 0.1.3 → 0.2.0
          - major   # 0.1.3 → 1.0.0
      dry_run:
        description: 'Dry run (build + sign but skip upload)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: Build, Sign & Publish
    runs-on: ubuntu-latest
    # Only run if: manual trigger OR merged PR with auto-merge-candidate label
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && 
       contains(github.event.pull_request.labels.*.name, 'auto-merge-candidate'))
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine version
        id: version
        run: |
          # Read current version from build.gradle.kts
          CURRENT=$(grep 'val libraryVersion' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Determine bump type
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ inputs.bump }}"
          else
            # Auto-merge from upstream sync = patch bump
            BUMP="patch"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "::notice::Version bump: $CURRENT → $NEW_VERSION ($BUMP)"

      - name: Bump version in build.gradle.kts
        run: |
          sed -i 's/val libraryVersion = ".*"/val libraryVersion = "${{ steps.version.outputs.new }}"/' app/build.gradle.kts
          echo "Updated version to ${{ steps.version.outputs.new }}"
          grep 'val libraryVersion' app/build.gradle.kts

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Trust the key
          KEY_ID=$(gpg --list-keys --keyid-format long | grep -A1 "^pub" | tail -1 | xargs)
          echo "$KEY_ID:6:" | gpg --import-ownertrust

      - name: Build release AAR
        run: ./gradlew clean :app:assembleRelease

      - name: Publish to local repo (sign artifacts)
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew :app:publishReleasePublicationToLocalRepository \
            -Psigning.gnupg.passphrase="$GPG_PASSPHRASE"

      - name: Create bundle.zip
        run: |
          cd app/build/repo
          zip -r ../bundle.zip org
          cd ../../..
          ls -lh app/build/bundle.zip

      - name: Upload to Maven Central
        if: ${{ inputs.dry_run != true }}
        env:
          MAVEN_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASS: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "$MAVEN_USER:$MAVEN_PASS" \
            -X POST \
            -F "bundle=@app/build/bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Upload successful! Deployment ID: $BODY"
            echo "deployment_id=$BODY" >> $GITHUB_ENV
          else
            echo "❌ Upload failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Commit version bump + tag
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts
          git commit -m "release: v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin master --tags

      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.new }}
          tag_name: v${{ steps.version.outputs.new }}
          generate_release_notes: true
          files: |
            app/build/outputs/aar/app-release.aar
            app/build/bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### 📦 Published v${{ steps.version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version bump | ${{ steps.version.outputs.current }} → ${{ steps.version.outputs.new }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Sign | ✅ |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "| Upload | ⏭️ Skipped (dry run) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Upload | ✅ |" >> $GITHUB_STEP_SUMMARY
            echo "| Maven Central | [View](https://central.sonatype.com/artifact/org.codeshipping/llama-kotlin-android/${{ steps.version.outputs.new }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```kotlin' >> $GITHUB_STEP_SUMMARY
          echo 'implementation("org.codeshipping:llama-kotlin-android:${{ steps.version.outputs.new }}")' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
